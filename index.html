<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم تهنئة عيد – سهل للخدمات</title>

    <!-- خطوط عربية -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Cairo:wght@400;700&family=Amiri&family=Changa:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Tajawal", sans-serif;
            background-color: #0a1a2f;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية هندسية */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255,140,40,0.15), transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(255,140,40,0.12), transparent 60%),
                radial-gradient(circle at 50% 10%, rgba(0,150,255,0.10), transparent 70%),
                linear-gradient(135deg, rgba(255,140,40,0.05) 0%, rgba(0,150,255,0.05) 100%);
            z-index: -1;
        }

        /* الشريط العلوي */
        .header {
            background-color: #f28c28;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header img {
            height: 95px;
            margin-left: 20px;
        }

        .header-title {
            font-size: 28px;
            font-weight: bold;
            margin-right: 20px;
        }

        .container {
            margin-top: 30px;
            text-align: center;
        }

        input {
            padding: 12px;
            width: 70%;
            border-radius: 8px;
            border: none;
            font-size: 18px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-orange { background-color: #f28c28; color: white; }
        .btn-blue { background-color: #0a1a2f; color: white; border: 2px solid #f28c28; }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            margin: 5px;
            cursor: pointer;
        }

        /* منطقة القالب */
        .preview-area {
            position: relative;
            width: 330px;
            margin: 20px auto;
        }

        .preview-area img {
            width: 100%;
            border-radius: 10px;
        }

        /* الاسم في أسفل الصفحة */
        .name-text {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: bold;
            pointer-events: none;
            transition: left 0.2s ease;
        }

        /* حقوق */
        .footer {
            margin-top: 40px;
            padding: 15px;
            font-size: 16px;
            color: #ddd;
        }
    </style>
</head>

<body>

    <!-- الشريط العلوي -->
    <div class="header">
        <div class="header-title">تصميم تهنئة عيد – سهل للخدمات</div>
        <img src="logo.png" alt="شعار سهل للخدمات">
    </div>

    <div class="container">

        <h2>اكتب اسمك</h2>
        <input type="text" id="username" placeholder="اكتب الاسم هنا">

        <h3>اختر لون الخط</h3>
        <button class="color-btn" style="background:white" onclick="changeColor('white')"></button>
        <button class="color-btn" style="background:#e6d5b8" onclick="changeColor('#e6d5b8')"></button>
        <button class="color-btn" style="background:black" onclick="changeColor('black')"></button>
        <button class="color-btn" style="background:#4b2e19" onclick="changeColor('#4b2e19')"></button>
        <button class="color-btn" style="background:#bba431" onclick="changeColor('#bba431')"></button>

        <h3>اختر نوع الخط</h3>
        <select id="fontSelect" onchange="changeFont()" style="padding:10px; border-radius:8px; font-size:18px;">
            <option value="Tajawal">Tajawal</option>
            <option value="Cairo">Cairo</option>
            <option value="Amiri">Amiri</option>
            <option value="Changa">Changa</option>
        </select>

        <h3>حرّك الاسم</h3>
        <button class="btn-orange" onclick="moveName(-15)">◀</button>
        <button class="btn-orange" onclick="moveName(15)">▶</button>

        <h3>اختر القالب</h3>
        <button class="btn-blue" onclick="changeTemplate('template1.png')">قالب 1</button>
        <button class="btn-blue" onclick="changeTemplate('template2.png')">قالب 2</button>
        <button class="btn-blue" onclick="changeTemplate('template3.png')">قالب 3</button>
        <button class="btn-blue" onclick="changeTemplate('template4.png')">قالب 4</button>

        <div class="preview-area">
            <img id="template" src="template1.png">
        </div>

        <p id="message" style="margin-top:20px; font-size:20px; font-weight:bold;"></p>

    </div>

    <div class="name-text" id="nameText">اسمك هنا</div>

    <div class="footer">
        جميع الحقوق محفوظة لـ سهل للخدمات ©
    </div>

<script>
    let nameText = document.getElementById("nameText");

    document.getElementById("username").addEventListener("input", function() {
        nameText.textContent = this.value || "اسمك هنا";
    });

    function changeColor(color) {
        nameText.style.color = color;
    }

    function changeFont() {
        let font = document.getElementById("fontSelect").value;
        nameText.style.fontFamily = font;
    }

    let offset = 0;
    function moveName(value) {
        offset += value;
        nameText.style.left = `calc(50% + ${offset}px)`;
    }

    function changeTemplate(img) {
        document.getElementById("template").src = img;
    }
</script>

</body>
</html>
