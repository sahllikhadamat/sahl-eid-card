<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم تهنئة عيد – سهل للخدمات</title>

    <style>
        body {
            margin: 0;
            font-family: "Tajawal", sans-serif;
            background-color: #0a1a2f; /* كحلي */
            color: white;
            text-align: center;
        }

        /* الشريط العلوي */
        .header {
            background-color: #f28c28; /* برتقالي */
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header img {
            height: 90px; /* شعار كبير وواضح */
            margin-left: 20px;
        }

        .header-title {
            font-size: 26px;
            font-weight: bold;
            margin-right: 20px;
        }

        /* منطقة المحتوى */
        .container {
            margin-top: 30px;
        }

        input {
            padding: 12px;
            width: 70%;
            border-radius: 8px;
            border: none;
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* أزرار */
        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-orange { background-color: #f28c28; color: white; }
        .btn-blue { background-color: #0a1a2f; color: white; border: 2px solid #f28c28; }

        /* ألوان الخط */
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            margin: 5px;
            cursor: pointer;
        }

        /* منطقة المعاينة */
        .preview-area {
            position: relative;
            width: 320px;
            margin: 20px auto;
        }

        .preview-area img {
            width: 100%;
            border-radius: 10px;
        }

        .name-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
        }

        /* حقوق */
        .footer {
            margin-top: 40px;
            padding: 15px;
            font-size: 16px;
            color: #ddd;
        }
    </style>
</head>

<body>

    <!-- الشريط العلوي -->
    <div class="header">
        <div class="header-title">تصميم تهنئة عيد – سهل للخدمات</div>
        <img src="IMAGE1.png" alt="شعار سهل للخدمات">
    </div>

    <div class="container">

        <h2>اكتب اسمك</h2>
        <input type="text" id="username" placeholder="اكتب الاسم هنا">

        <h3>اختر لون الخط</h3>
        <button class="color-btn" style="background:white" onclick="changeColor('white')"></button>
        <button class="color-btn" style="background:#e6d5b8" onclick="changeColor('#e6d5b8')"></button>
        <button class="color-btn" style="background:black" onclick="changeColor('black')"></button>
        <button class="color-btn" style="background:gold" onclick="changeColor('gold')"></button>

        <h3>حرّك الاسم</h3>
        <button class="btn-orange" onclick="moveName(-10)">◀</button>
        <button class="btn-orange" onclick="moveName(10)">▶</button>

        <h3>اختر القالب</h3>
        <button class="btn-blue" onclick="changeTemplate('IMAGE2.png')">قالب 1</button>
        <button class="btn-blue" onclick="changeTemplate('IMAGE3.png')">قالب 2</button>
        <button class="btn-blue" onclick="changeTemplate('IMAGE4.png')">قالب 3</button>

        <div class="preview-area">
            <img id="template" src="IMAGE2.png">
            <div id="nameText" class="name-text">اسمك هنا</div>
        </div>

        <button class="btn-orange" onclick="generateCard()">إنشاء التهنئة</button>

        <p id="message" style="margin-top:20px; font-size:20px; font-weight:bold;"></p>

    </div>

    <div class="footer">
        جميع الحقوق محفوظة لـ سهل للخدمات ©
    </div>

<script>
    let nameText = document.getElementById("nameText");
    let template = document.getElementById("template");

    document.getElementById("username").addEventListener("input", function() {
        nameText.textContent = this.value || "اسمك هنا";
    });

    function changeColor(color) {
        nameText.style.color = color;
    }

    function moveName(value) {
        let current = parseInt(nameText.style.left || "50%");
        nameText.style.left = `calc(${current}% + ${value}px)`;
    }

    function changeTemplate(img) {
        template.src = img;
    }

    function generateCard() {
        document.getElementById("message").textContent =
            "كل عام وأنت بخير، شكرًا لاختيارك سهل للخدمات";
    }
</script>

</body>
</html>
