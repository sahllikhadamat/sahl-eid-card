<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تهنئة العيد - متجر سهل</title>

<!-- خط مشابه ل ZEYADAArabic1ExtraBold -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: "Cairo", sans-serif;
        background: #f5f5f5;
        text-align: center;
        padding: 20px;
    }

    h2 {
        margin-bottom: 15px;
        color: #008f6a;
    }

    .templates {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }

    .templates img {
        width: 180px;
        height: auto;
        border-radius: 10px;
        cursor: pointer;
        border: 3px solid transparent;
        transition: 0.3s;
    }

    .templates img.selected {
        border-color: #008f6a;
        transform: scale(1.05);
    }

    input {
        padding: 12px;
        width: 260px;
        font-size: 18px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 1px solid #ccc;
        text-align: center;
    }

    button {
        padding: 12px 25px;
        background: #008f6a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        margin-bottom: 20px;
    }

    canvas {
        margin-top: 25px;
        display: none;
        border-radius: 12px;
        box-shadow: 0 0 10px #ccc;
    }
</style>
</head>

<body>

<h2>اختر قالب التهنئة</h2>

<div class="templates">
    <img src="IMAGE1.png" onclick="selectTemplate(this, 0)">
    <img src="IMAGE2.png" onclick="selectTemplate(this, 1)">
    <img src="IMAGE3.png" onclick="selectTemplate(this, 2)">
    <img src="IMAGE4.png" onclick="selectTemplate(this, 3)">
</div>

<input type="text" id="nameInput" placeholder="اكتب اسمك هنا">

<br>

<button onclick="generateCard()">إنشاء التهنئة</button>

<canvas id="finalCanvas"></canvas>

<script>
let selectedIndex = null;

function selectTemplate(img, index) {
    document.querySelectorAll(".templates img").forEach(i => i.classList.remove("selected"));
    img.classList.add("selected");
    selectedIndex = index;
}

function generateCard() {
    if (selectedIndex === null) {
        alert("الرجاء اختيار قالب");
        return;
    }

    const name = document.getElementById("nameInput").value.trim();
    if (name === "") {
        alert("الرجاء كتابة الاسم");
        return;
    }

    const images = ["IMAGE1.png", "IMAGE2.png", "IMAGE3.png", "IMAGE4.png"];
    const img = new Image();
    img.src = images[selectedIndex];

    img.onload = function () {
        const canvas = document.getElementById("finalCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        ctx.font = "700 48px 'Cairo'";
        ctx.fillStyle = "#000";
        ctx.textAlign = "center";

        ctx.fillText(name, canvas.width / 2, canvas.height - 60);

        canvas.style.display = "block";

        const link = document.createElement("a");
        link.download = "تهنئة_العيد.png";
        link.href = canvas.toDataURL();
        link.click();
    };
}
</script>

</body>
</html>
